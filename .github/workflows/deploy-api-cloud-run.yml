name: Deploy API to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/smoke-api.mjs"
      - ".github/workflows/deploy-api-cloud-run.yml"

permissions:
  contents: read
  id-token: write

env:
  REGION: ${{ vars.GCP_REGION || 'asia-northeast3' }}
  GAR_LOCATION: asia-northeast3
  GAR_REPOSITORY: hwp2pdf
  SERVICE_NAME: ${{ vars.CLOUD_RUN_API_SERVICE || 'hwp2pdf-api' }}
  # Cloud Tasks queue for durable conversion dispatch (Todo 6/13).
  # Create with: gcloud tasks queues create conversion-queue --location=$REGION
  CLOUD_TASKS_QUEUE_NAME: ${{ vars.CLOUD_TASKS_QUEUE_NAME || 'conversion-queue' }}
  CLOUD_TASKS_LOCATION: ${{ vars.CLOUD_TASKS_LOCATION || vars.GCP_REGION || 'asia-northeast3' }}
  CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL: ${{ secrets.CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL || secrets.GCP_SERVICE_ACCOUNT_EMAIL || vars.CLOUD_RUN_API_SERVICE_ACCOUNT }}
  CLOUD_RUN_MAX_INSTANCES: ${{ vars.CLOUD_RUN_MAX_INSTANCES || '1' }}
  # Firestore collections for job and board persistence.
  FIRESTORE_JOBS_COLLECTION: ${{ vars.FIRESTORE_JOBS_COLLECTION || 'jobs' }}
  FIRESTORE_BOARD_POSTS_COLLECTION: ${{ vars.FIRESTORE_BOARD_POSTS_COLLECTION || 'boardPosts' }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check deployment configuration
        id: check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          CLOUD_RUN_API_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL || secrets.CLOUD_RUN_API_SERVICE_ACCOUNT || vars.CLOUD_RUN_API_SERVICE_ACCOUNT }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME || vars.GCS_BUCKET_NAME }}
          WEB_ORIGIN: ${{ secrets.WEB_ORIGIN || vars.WEB_ORIGIN }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=()
          for name in \
            GCP_PROJECT_ID \
            CLOUD_RUN_API_SERVICE_ACCOUNT \
            GCS_BUCKET_NAME \
            WEB_ORIGIN \
            GCP_SA_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Cloud Run deployment is not configured yet. Missing: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Build and push API image
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/${SERVICE_NAME}:${{ github.sha }}"
          docker build -f apps/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --concurrency 1 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances "${CLOUD_RUN_MAX_INSTANCES}" \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL || secrets.CLOUD_RUN_API_SERVICE_ACCOUNT || vars.CLOUD_RUN_API_SERVICE_ACCOUNT }}" \
            --set-env-vars NODE_ENV=production \
            --set-env-vars CORS_ORIGIN="${{ secrets.WEB_ORIGIN || vars.WEB_ORIGIN }}" \
            --set-env-vars STORAGE_BACKEND=gcs \
            --set-env-vars GCS_BUCKET_NAME="${{ secrets.GCS_BUCKET_NAME || vars.GCS_BUCKET_NAME }}" \
            --set-env-vars GCS_ORIGINAL_PREFIX="staging" \
            --set-env-vars GCS_RESULT_PREFIX="output" \
            --set-env-vars SIGNED_DOWNLOAD_URL_TTL_MINUTES="15" \
            --set-env-vars JOB_RETENTION_MINUTES="30" \
            --set-env-vars JOB_STORE_BACKEND=firestore \
            --set-env-vars FIRESTORE_DATABASE_ID="(default)" \
            --set-env-vars FIRESTORE_JOBS_COLLECTION="${FIRESTORE_JOBS_COLLECTION}" \
            --set-env-vars FIRESTORE_BOARD_POSTS_COLLECTION="${FIRESTORE_BOARD_POSTS_COLLECTION}" \
            --set-env-vars FIREBASE_PROJECT_ID="${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}" \
            --set-env-vars FIREBASE_ADMIN_MODE="adc" \
            --set-env-vars GOOGLE_APPLICATION_CREDENTIALS_JSON="${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON || '' }}" \
            --set-env-vars CONVERSION_DISPATCHER="cloud-tasks" \
            --set-env-vars CLOUD_TASKS_QUEUE_NAME="${CLOUD_TASKS_QUEUE_NAME}" \
            --set-env-vars CLOUD_TASKS_LOCATION="${CLOUD_TASKS_LOCATION}" \
            --set-env-vars CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL="${CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL}"

      - name: Resolve Cloud Run service URL and configure worker endpoint
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --region "$REGION" --format='value(status.url)')
          WORKER_URL="${SERVICE_URL}/internal/workers/convert"
          echo "Configuring INTERNAL_WORKER_URL=${WORKER_URL}"
          gcloud run services update "$SERVICE_NAME" \
            --region "$REGION" \
            --update-env-vars INTERNAL_WORKER_URL="${WORKER_URL}" \
            --update-env-vars INTERNAL_WORKER_AUDIENCE="${WORKER_URL}"
          echo "SERVICE_URL=${SERVICE_URL}" >> "$GITHUB_ENV"

      - name: Smoke test deployed API
        run: |
          API_BASE_URL="${SERVICE_URL}" node scripts/smoke-api.mjs
